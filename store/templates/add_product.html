{% extends 'base.html' %}

{% load static %}

{% block content %}

<style>

    .video-container{

        position:relative;

        min-height:100vh;

        overflow:hidden;
    }

    .bg-video{

        position:fixed;

        top:0;

        left:0;

        width:100%;

        height:100%;

        object-fit:cover;

        z-index:-2;
    }

    .overlay{

        position:absolute;

        top:0;

        left:0;

        width:100%;

        height:100%;

        background:rgba(0,0,0,0.35);

        z-index:-1;
    }

    .page-container{

        display:flex;

        justify-content:center;

        align-items:center;

        min-height:90vh;
    }

    .form-box{

        background:rgba(15,23,42,0.65);

        backdrop-filter:blur(20px);

        -webkit-backdrop-filter:blur(20px);

        border:1px solid rgba(255,255,255,0.15);

        width:420px;

        padding:40px;

        border-radius:24px;

        box-shadow:
        0 20px 50px rgba(0,0,0,0.35);
    }

    h1{

        text-align:center;

        margin-bottom:35px;

        color:white;

        font-size:38px;
    }

    input,
    textarea{

        width:100%;

        padding:16px;

        margin-bottom:20px;

        background:rgba(255,255,255,0.08);

        border:1px solid rgba(255,255,255,0.15);

        border-radius:12px;

        font-size:16px;

        color:white;

        outline:none;

        box-sizing:border-box;
    }

    input::placeholder,
    textarea::placeholder{

        color:#cbd5e1;
    }

    textarea{

        height:120px;

        resize:none;
    }

    input:focus,
    textarea:focus{

        border-color:#60a5fa;

        box-shadow:
        0 0 15px rgba(96,165,250,0.3);
    }

    button{

        width:100%;

        background:#2563eb;

        color:white;

        border:none;

        padding:16px;

        border-radius:12px;

        font-size:18px;

        font-weight:bold;

        cursor:pointer;

        transition:0.3s;
    }

    button:hover{

        background:#3b82f6;

        box-shadow:
        0 0 20px rgba(59,130,246,0.5);

        transform:translateY(-3px);
    }

</style>

<div class="video-container">

    <video autoplay muted loop playsinline class="bg-video">

        <source
        src="{% static 'videos/add-product-bg.mp4' %}"
        type="video/mp4">

    </video>

    <div class="overlay"></div>

    <div class="page-container">

        <div class="form-box">

            <h1>
                Add Product
            </h1>

            <form method="POST">

                {% csrf_token %}

                <input
                type="text"
                name="name"
                placeholder="Product Name"
                required>

                <input
                type="number"
                name="price"
                placeholder="Price"
                required>

                <input
                type="text"
                name="category"
                placeholder="Category"
                required>

                <input
                type="text"
                name="image_url"
                placeholder="Image URL">

                <textarea
                name="description"
                placeholder="Description"
                required></textarea>

                <button type="submit">

                    Add Product

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
