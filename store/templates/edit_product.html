{% extends 'base.html' %}

{% block content %}

<style>

    body{

        background:#0f172a;
    }

    .page-container{

        display:flex;

        justify-content:center;

        align-items:center;

        min-height:90vh;
    }

    .form-box{

        background:white;

        width:420px;

        padding:40px;

        border-radius:24px;

        box-shadow:
        0 20px 50px rgba(0,0,0,0.35);
    }

    h1{

        text-align:center;

        margin-bottom:35px;

        color:#0f172a;
    }

    input,
    textarea{

        width:100%;

        padding:16px;

        margin-bottom:20px;

        border:1px solid #cbd5e1;

        border-radius:12px;

        box-sizing:border-box;
    }

    textarea{

        height:120px;

        resize:none;
    }

    button{

        width:100%;

        background:#22c55e;

        color:white;

        border:none;

        padding:16px;

        border-radius:12px;

        font-size:18px;

        cursor:pointer;
    }

</style>

<div class="page-container">

    <div class="form-box">

        <h1>
            Edit Product
        </h1>

        <form method="POST">

            {% csrf_token %}

            <input
            type="text"
            name="name"
            value="{{ product.name }}">

            <input
            type="number"
            name="price"
            value="{{ product.price }}">

            <input
            type="text"
            name="category"
            value="{{ product.category }}">

            <input
            type="text"
            name="image_url"
            value="{{ product.image_url }}">

            <textarea
            name="description">{{ product.description }}</textarea>

            <button type="submit">

                Update Product

            </button>

        </form>

    </div>

</div>

{% endblock %}
