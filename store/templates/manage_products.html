{% extends 'base.html' %}

{% load static %}

{% block content %}

<video autoplay muted loop playsinline class="bg-video">

    <source
    src="{% static 'videos/manage-products-bg.mp4' %}"
    type="video/mp4">

</video>

<style>

    body{

        background:#0f172a;
    }

    .bg-video{

        position:fixed;

        top:0;

        left:0;

        width:100%;

        height:100%;

        object-fit:cover;

        z-index:-2;
    }

    body::before{

        content:"";

        position:fixed;

        top:0;

        left:0;

        width:100%;

        height:100%;

        background:rgba(0,0,0,0.55);

        z-index:-1;
    }

    .container{

        width:90%;

        margin:60px auto;
    }

    h1{

        text-align:center;

        margin-bottom:50px;

        font-size:55px;

        color:white;
    }

    .grid{

        display:grid;

        grid-template-columns:
        repeat(auto-fit,minmax(280px,1fr));

        gap:30px;
    }

.card{

    background:rgba(255,255,255,0.15);

    backdrop-filter:blur(12px);

    -webkit-backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.2);

    color:white;

    padding:40px;

    border-radius:24px;

    text-align:center;
}

    .card h2{

        font-size:32px;

        margin-bottom:20px;
    }

    .card a{

        text-decoration:none;
    }

    .btn{

        background:#2563eb;

        color:white;

        border:none;

        padding:14px 28px;

        border-radius:12px;

        font-size:18px;

        cursor:pointer;
    }

</style>

<div class="container">

    <h1>
        Product Management
    </h1>

    <div class="grid">

        <div class="card">

            <h2>
                Add Product
            </h2>

            <a href="/add-product/">

                <button class="btn">

                    Open

                </button>

            </a>

        </div>

        <div class="card">

            <h2>
                View Products
            </h2>

            <a href="/view-products/">

                <button class="btn">

                    Open

                </button>

            </a>

        </div>

        <div class="card">

            <h2>
                View Orders
            </h2>

            <a href="/view-orders/">

                <button class="btn">

                    Open

                </button>

            </a>

        </div>

    </div>

</div>

{% endblock %}
